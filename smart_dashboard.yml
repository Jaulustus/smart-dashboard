id: smart_dashboard
name: "Smart Dashboard & Advanced Duplicate Finder"
description: "AI-powered duplicate finder (pHash) and local recommendation engine for the dashboard / KI-gestützter Duplikatfinder (pHash) und lokale Empfehlungs-Engine für das Dashboard."
version: "0.1.0"

url: "https://github.com/Jaulustus/smart-dashboard"
author: "Jaulustus"

exec:
  - python
  - "{pluginDir}/smart_dashboard.py"

interface: raw

tasks:
  - name: "Start Advanced Duplicate Scan / Erweiterte Duplikatsuche starten"
    description: "Analyzes videos using Perceptual Hashing for visual duplicates / Analysiert Videos mittels Perceptual Hashing auf visuelle Duplikate."
    args:
      - "smart_dup_scan"
  
  - name: "Update Dashboard Recommendations / Dashboard-Empfehlungen aktualisieren"
    description: "Calculates local recommendations based on your viewing history / Berechnet lokale Empfehlungen basierend auf deinem Verlauf."
    args:
      - "smart_dash_calc"