name: "Smart Dashboard & Advanced Duplicate Finder"
description: "AI-powered duplicate finder (pHash) and local recommendation engine for the dashboard."
version: "0.1.0"

exec:
  - python
  - "{pluginDir}/smart_dashboard.py"

interface: raw

tasks:
  - name: "Start Advanced Duplicate Scan / Erweiterte Duplikatsuche starten"
    description: "Analyzes videos using Perceptual Hashing for visual duplicates."
    execArgs:
      - "smart_dup_scan"
  
  - name: "Update Dashboard Recommendations / Dashboard-Empfehlungen aktualisieren"
    description: "Calculates local recommendations based on your viewing history."
    execArgs:
      - "smart_dash_calc"